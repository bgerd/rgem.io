<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rgem.io</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.125rem;
      color: #999;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a.cta {
      display: inline-block;
      background: #e8e8e8;
      color: #0d0d0d;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.15s;
    }
    a.cta:hover { background: #fff; }
  </style>
</head>
<body>
  <div id="root">
    <div class="container">
      <h1>rgem.io</h1>
      <p>A shared light you can touch from anywhere.</p>
      <a class="cta" href="https://app.rgem.io">Try it now &rarr;</a>
    </div>
  </div>
</body>
</html>
