AWSTemplateFormatVersion: "2010-09-09"

# NOTE. Enables SAM shorthand for any AWS::Serverless::* resources
Transform: AWS::Serverless-2016-10-31
Description: >
  RGEM.io

  SAM Template for RGEM.io that has the DynamoDB tables and Lambda
  functions needed for the HTTP and WebSocket APIs.

# For custom domain names and certificates
Parameters:
  EnvName:
    Type: String
    AllowedValues:
      - dev
      - stage
      - prod
  DomainBase:
    Type: String
    Default: rgem.io
  HostedZoneId:
    Type: String
  CertificateArn:
    Type: String

Conditions:
  IsProd: !Equals [!Ref EnvName, "prod"]

Resources:

# Shared Layer ######
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${AWS::StackName}-common-layer"
      ContentUri: backend/layers/common/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Delete

# State ######
  ConnectionsTable:
    # Holds the connection identifiers to set identifiers for each connected client
    # NOTE: By default SAM uses PAY_PER_REQUEST billing (on-demand) and enables SSE with an AWS-managed CMK.
    # TODO: Replace DynamoDB with a more suitable database for CONNECTIONS_TABLE such as Redis or ElastiCache for lower latency and higher throughput. 
    # TODO: Add TTL attribute to CONNECTIONS_TABLE to automatically delete stale connections.
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: !Sub "${AWS::StackName}-connections-table"
      PrimaryKey:
        Name: connectionId
        Type: String

  GemStateTable:
    # Holds the gem state (a 16-element integer array) for each gemId
    # NOTE: By default SAM uses PAY_PER_REQUEST billing (on-demand) and enables SSE with an AWS-managed CMK.
    # TODO: Replace DynamoDB with a more suitable database for GEM_STATE_TABLE such as Redis or ElastiCache for lower latency and higher throughput. 
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: !Sub "${AWS::StackName}-gem-state-table"
      PrimaryKey:
        Name: gemId
        Type: String

###############################################################
  RGempadHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: RGempadHttpApi
      ProtocolType: HTTP
      # The route selection expression determines how the API Gateway selects the route to invoke based on the request.
      # In this case, we use the request path to determine the route.
      RouteSelectionExpression: "$request.method $request.path"

  #######
  RGempadHttpApiDeployment:
    # NOTE: Deployments are immutable snapshots. CloudFormation only replaces this
    # resource when one of its own properties changes. Bump `Description` (rev: N)
    # whenever you modify a route key, integration URI, or RouteSelectionExpression —
    # otherwise API Gateway will not pick up the change even though Lambda is updated.
    # NOTE: `DependsOn` controls creation order only; it does NOT trigger re-deployment.
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - GemPostRoute
    Properties:
      ApiId: !Ref RGempadHttpApi
      Description: "rev: 1"

  #######
  RGempadHttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: Prod
      Description:  RGempadHttpApi Prod Stage
      DeploymentId: !Ref RGempadHttpApiDeployment
      ApiId: !Ref RGempadHttpApi

  #######
  GemPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RGempadHttpApi
      RouteKey: "POST /gem/{gemId}"
      AuthorizationType: NONE
      OperationName: GemPostRoute
      Target: !Join
        - "/"
        - - "integrations"
          - !Ref GemPostInteg

  #######
  GemPostInteg:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref RGempadHttpApi
      Description: Gem Post Integration
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      # Informs lambda payload and response object formats
      # seee: https://docs.aws.amazon.com/apigateway/latest/developerguide/http-api-develop-integrations-lambda.html
      PayloadFormatVersion: "2.0"
      IntegrationUri:
        Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GemPostFunction.Arn}/invocations

  #######
  GemPostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/gempost/
      Handler: app.handler
      MemorySize: 256
      Runtime: nodejs20.x
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          # Note: WS_API_ENDPOINT is a reference to the WebSocket API endpoint for functions external to the RGempadWSApi gateway
          WS_API_ENDPOINT: !Sub "https://${RGempadWSApi}.execute-api.${AWS::Region}.amazonaws.com/${RGempadWSApiStage}"
          CONNECTIONS_TABLE: !Ref ConnectionsTable
          GEM_STATE_TABLE: !Ref GemStateTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GemStateTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - "execute-api:ManageConnections"
              Resource:
                - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RGempadWSApi}/*"

  #######
  GemPostPermission:
    Type: AWS::Lambda::Permission
    DependsOn:
      - RGempadHttpApi
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref GemPostFunction
      Principal: apigateway.amazonaws.com

###############################################################
  RGempadWSApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: RGempadWSApi
      ProtocolType: WEBSOCKET
      # The route selection expression determines how the API Gateway selects the route to invoke based on the request.
      # In this case, we use the request body to determine the route.
      # The expression "$request.body.type" means that the API Gateway will look for a "type" field in the JSON body of the request to determine which route to invoke.
      # TODO: Revisit JSON structure to minimize payload size (e.g. replace "type" with "t"). 
      # TODO: Define TypeScript interface shared between client and server for message format. Reimplement lambda functions in TypeScript.
      RouteSelectionExpression: "$request.body.type"

#######
  RGempadWSApiDeployment:
    # NOTE: Deployments are immutable snapshots. CloudFormation only replaces this
    # resource when one of its own properties changes. Bump `Description` (rev: N)
    # whenever you modify a route key, integration URI, or RouteSelectionExpression —
    # otherwise API Gateway will not pick up the change even though Lambda is updated.
    # NOTE: `DependsOn` controls creation order only; it does NOT trigger re-deployment.
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - HelloRoute
      - HelloInteg
      - PingRoute
      - PingInteg
      - ToggleRoute
      - ToggleInteg
      - DisconnectRoute
      - DisconnectInteg
    Properties:
      ApiId: !Ref RGempadWSApi
      Description: "rev: 1"

#######
  RGempadWSApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: Prod
      Description: RGempadWSApi Prod Stage
      DeploymentId: !Ref RGempadWSApiDeployment
      ApiId: !Ref RGempadWSApi

#######
  HelloRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RGempadWSApi
      # Note: that the route key is "hello" which means that the API Gateway will look for a "type" field in the JSON body
      # of the request with the value "hello" to invoke this route, per the RouteSelectionExpression.
      # WARNING: Changing the RouteKey will require forcing a new deployment.
      # TODO: Learn how to force a new deployment without having to delete the stack
      RouteKey: hello
      AuthorizationType: NONE
      OperationName: HelloRoute
      Target: !Join
        - "/"
        - - "integrations"
          - !Ref HelloInteg
  HelloInteg:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref RGempadWSApi
      Description: Hello Integration
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OnHelloFunction.Arn}/invocations

#######
  PingRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RGempadWSApi
      RouteKey: ping
      AuthorizationType: NONE
      OperationName: PingRoute
      Target: !Join
        - "/"
        - - "integrations"
          - !Ref PingInteg
  PingInteg:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref RGempadWSApi
      Description: Ping Integration
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OnPingFunction.Arn}/invocations

#######
  ToggleRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RGempadWSApi
      RouteKey: toggle
      AuthorizationType: NONE
      OperationName: ToggleRoute
      Target: !Join
        - "/"
        - - "integrations"
          - !Ref ToggleInteg
  ToggleInteg:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref RGempadWSApi
      Description: Toggle Integration
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OnToggleFunction.Arn}/invocations

#######
  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RGempadWSApi
      # Note: that the route key is $disconnect which is a special route invoked when a client disconnects
      RouteKey: $disconnect
      AuthorizationType: NONE
      OperationName: DisconnectRoute
      Target: !Join
        - "/"
        - - "integrations"
          - !Ref DisconnectInteg
  DisconnectInteg:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref RGempadWSApi
      Description: Disconnect Integration
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OnDisconnectFunction.Arn}/invocations

##############
  OnHelloFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/onhello/
      Handler: app.handler
      MemorySize: 256
      Runtime: nodejs20.x
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable        
          GEM_STATE_TABLE: !Ref GemStateTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GemStateTable
        - Statement:
          - Effect: Allow
            Action:
              - "execute-api:ManageConnections"
            Resource:
              - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RGempadWSApi}/*"

  OnHelloPermission:
    Type: AWS::Lambda::Permission
    DependsOn:
      - RGempadWSApi
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OnHelloFunction
      Principal: apigateway.amazonaws.com

##############
  OnPingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/onping/
      Handler: app.handler
      MemorySize: 256
      Runtime: nodejs20.x
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - "execute-api:ManageConnections"
              Resource:
                - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RGempadWSApi}/*"

  OnPingPermission:
    Type: AWS::Lambda::Permission
    DependsOn:
      - RGempadWSApi
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OnPingFunction
      Principal: apigateway.amazonaws.com

##############
  OnToggleFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/ontoggle/
      Handler: app.handler
      MemorySize: 256
      Runtime: nodejs20.x
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable        
          GEM_STATE_TABLE: !Ref GemStateTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GemStateTable
        - Statement:
            - Effect: Allow
              Action:
                - "execute-api:ManageConnections"
              Resource:
                - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RGempadWSApi}/*"

  OnTogglePermission:
    Type: AWS::Lambda::Permission
    DependsOn:
      - RGempadWSApi
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OnToggleFunction
      Principal: apigateway.amazonaws.com

##############
  OnDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/ondisconnect/
      Handler: app.handler
      MemorySize: 256
      Runtime: nodejs20.x
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  OnDisconnectPermission:
    Type: AWS::Lambda::Permission
    DependsOn:
      - RGempadWSApi
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OnDisconnectFunction
      Principal: apigateway.amazonaws.com

###############################################################
# Heartbeat EventBridge rule
  HeartbeatScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Trigger heartbeat Lambda every 9 minutes"
      ScheduleExpression: rate(9 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt SchedHeartbeatFunction.Arn
          Id: HeartbeatFunctionTarget

  # Grant invocation permission from Events to Lambda
  HeartbeatPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SchedHeartbeatFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HeartbeatScheduleRule.Arn

##############
# TODO: Deprecate Scheduled Heartbeat in favor of client-side ping/pong and addition of 
#       DynamoDB TTL attribute to sweep stale connections. Only neccesary to keep alive
#       wscat connections during testing.
  SchedHeartbeatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/schedhb/
      Handler: app.handler
      MemorySize: 256
      Runtime: nodejs20.x
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          # Note this is a reference to the WebSocket API endpoint for functions external to that gateway
          WS_API_ENDPOINT: !Sub "https://${RGempadWSApi}.execute-api.${AWS::Region}.amazonaws.com/${RGempadWSApiStage}"
          CONNECTIONS_TABLE: !Ref ConnectionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - "execute-api:ManageConnections"
              Resource:
                - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RGempadWSApi}/*"

  SchedHeartbeatFunctionPermission:
    Type: AWS::Lambda::Permission
    DependsOn:
      - RGempadWSApi
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref  SchedHeartbeatFunction
      Principal: apigateway.amazonaws.com

###############################################################
# Setup CloudFront distribution for static website hosting of the app SPA
  AppBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-app-bucket"
      # Enforce bucket to block all public access
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  
  # Grant CloudFront access to read from the S3 bucket
  AppBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AppBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub "${AppBucket.Arn}/*"
            Condition:
              StringEquals:
                # Only this distribution can use the OAC to access the bucket
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AppDistribution}"

  # Requires CloudFront to sign and identify its requests to the S3 bucket
  AppBucketOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-app-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
        Description: !Sub "OAC for app-${EnvName}.${DomainBase}"

  AppDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "App for app-${EnvName}.${DomainBase}"
        # Note: Authorizes the distribution to accept requests for these domain names
        Aliases: 
          - !If
            - IsProd
            - !Sub "app.${DomainBase}"
            - !Sub "app-${EnvName}.${DomainBase}"
        DefaultRootObject: "index.html"
        Origins:
          - Id: !Sub "app-origin-${EnvName}"
            # Note: An S3 bucket’s RegionalDomainName is the AWS-provided DNS hostname
            #       for that bucket’s REST endpoint in its specific region. It combines
            #       your bucket name with an AWS-controlled regional suffix
            #       (e.g. <bucketname>.s3.<region>.amazonaws.com) and is the recommended value to
            #       use as a CloudFront origin.
            DomainName: !GetAtt AppBucket.RegionalDomainName
            S3OriginConfig: {}  # Required but empty when using OAC
            OriginAccessControlId: !Ref AppBucketOAC

        # CDN Cache behavior settings
        DefaultCacheBehavior:
          TargetOriginId: !Sub "app-origin-${EnvName}"
          # Note: Redirect all HTTP requests to HTTPS
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          # You can later attach CachePolicy/OriginRequestPolicy here
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        CustomErrorResponses:
          # SPA routing: map 404, 403 to /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: "/index.html"
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: "/index.html"

###############################################################
# Setup custom domain names for the HTTP and WebSocket APIs
# Note: We are using a single pre-existing ACM certificate in us-east-1 for both domain names

  # Domain Names
  HttpApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !If
        - IsProd
        - !Sub "api.${DomainBase}"
        - !Sub "api-${EnvName}.${DomainBase}"
      DomainNameConfigurations:
        - CertificateArn: !Ref CertificateArn
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  WebSocketApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !If
        - IsProd
        - !Sub "ws.${DomainBase}"
        - !Sub "ws-${EnvName}.${DomainBase}"
      DomainNameConfigurations:
        - CertificateArn: !Ref CertificateArn
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  # Api Mappings
  HttpApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref RGempadHttpApi
      DomainName: !Ref HttpApiDomainName
      Stage: !Ref RGempadHttpApiStage

  WebSocketApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref RGempadWSApi
      DomainName: !Ref WebSocketApiDomainName
      Stage: !Ref RGempadWSApiStage

  # Route53 Alias Records
  HttpApiAliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - IsProd
        - !Sub "api.${DomainBase}."
        - !Sub "api-${EnvName}.${DomainBase}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt HttpApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt HttpApiDomainName.RegionalHostedZoneId
        EvaluateTargetHealth: false

  HttpApiAliasRecordIPv6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - IsProd
        - !Sub "api.${DomainBase}."
        - !Sub "api-${EnvName}.${DomainBase}."
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt HttpApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt HttpApiDomainName.RegionalHostedZoneId
        EvaluateTargetHealth: false

  WebSocketApiAliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - IsProd
        - !Sub "ws.${DomainBase}."
        - !Sub "ws-${EnvName}.${DomainBase}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt WebSocketApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt WebSocketApiDomainName.RegionalHostedZoneId
        EvaluateTargetHealth: false

  WebSocketApiAliasRecordIPv6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - IsProd
        - !Sub "ws.${DomainBase}."
        - !Sub "ws-${EnvName}.${DomainBase}."
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt WebSocketApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt WebSocketApiDomainName.RegionalHostedZoneId
        EvaluateTargetHealth: false

  AppAliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - IsProd
        - !Sub "app.${DomainBase}."
        - !Sub "app-${EnvName}.${DomainBase}."
      Type: A
      AliasTarget:
        # Note: A CloudFront distribution’s DomainName is its AWS-assigned public
        #       DNS name (*.cloudfront.net), and all such names live in the same
        #       AWS-owned Route 53 hosted zone (Z2FDTNDATAQYW2).
        # see: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-properties-route53-recordset-aliastarget.html
        DNSName: !GetAtt AppDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  AppAliasRecordIPv6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - IsProd
        - !Sub "app.${DomainBase}."
        - !Sub "app-${EnvName}.${DomainBase}."
      Type: AAAA
      AliasTarget:
        # Note: A CloudFront distribution’s DomainName is its AWS-assigned public
        #       DNS name (*.cloudfront.net), and all such names live in the same
        #       AWS-owned Route 53 hosted zone (Z2FDTNDATAQYW2).
        # see: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-properties-route53-recordset-aliastarget.html
        DNSName: !GetAtt AppDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

###############################################################
# Setup CloudFront distribution for the static landing page (prod only)
  LandingBucket:
    Type: AWS::S3::Bucket
    Condition: IsProd
    Properties:
      BucketName: !Sub "${AWS::StackName}-landing-bucket"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LandingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: IsProd
    Properties:
      Bucket: !Ref LandingBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub "${LandingBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${LandingDistribution}"

  LandingBucketOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: IsProd
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-landing-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
        Description: !Sub "OAC for ${DomainBase}"

  LandingWwwRedirectFunction:
    Type: AWS::CloudFront::Function
    Condition: IsProd
    Properties:
      Name: !Sub "${AWS::StackName}-www-redirect"
      AutoPublish: true
      FunctionConfig:
        Comment: "Redirect www to apex"
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var host = request.headers.host.value;
          if (host.startsWith('www.')) {
            return {
              statusCode: 301,
              statusDescription: 'Moved Permanently',
              headers: {
                location: { value: 'https://' + host.slice(4) + request.uri }
              }
            };
          }
          return request;
        }

  LandingDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: IsProd
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Landing page for ${DomainBase}"
        Aliases:
          - !Ref DomainBase
          - !Sub "www.${DomainBase}"
        DefaultRootObject: "index.html"
        Origins:
          - Id: landing-origin
            DomainName: !GetAtt LandingBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref LandingBucketOAC
        DefaultCacheBehavior:
          TargetOriginId: landing-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt LandingWwwRedirectFunction.FunctionARN
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: "/index.html"
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: "/index.html"

  LandingAliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: IsProd
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${DomainBase}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt LandingDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  LandingAliasRecordIPv6:
    Type: AWS::Route53::RecordSet
    Condition: IsProd
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${DomainBase}."
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt LandingDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WwwAliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: IsProd
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainBase}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt LandingDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WwwAliasRecordIPv6:
    Type: AWS::Route53::RecordSet
    Condition: IsProd
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainBase}."
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt LandingDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

###############################################################
Outputs:
  ConnectionsTableArn:
    Description: "Connections table ARN"
    Value: !GetAtt ConnectionsTable.Arn

  GemStateTableArn:
    Description: "Gem State table ARN"
    Value: !GetAtt GemStateTable.Arn

  OnHelloFunctionArn:
    Description: "OnHello function ARN"
    Value: !GetAtt OnHelloFunction.Arn

  OnPingFunctionArn:
    Description: "OnPing function ARN"
    Value: !GetAtt OnPingFunction.Arn

  OnToggleFunctionArn:
    Description: "OnToggle function ARN"
    Value: !GetAtt OnToggleFunction.Arn

  SchedHeartbeatFunctionArn:
    Description:  "SchedHeartbeat function ARN"
    Value: !GetAtt  SchedHeartbeatFunction.Arn

  OnDisconnectFunctionArn:
    Description: "OnDisconnect function ARN"
    Value: !GetAtt OnDisconnectFunction.Arn

  WebSocketURI:
    Description: "The WSS Protocol URI to connect to"
    Value:
      !Join [
        "",
        [
          "wss://",
          !Ref RGempadWSApi,
          ".execute-api.",
          !Ref "AWS::Region",
          ".amazonaws.com/",
          !Ref "RGempadWSApiStage",
        ],
      ]

  HttpApiEndpoint:
    Description: "The HTTPS Protocol URI to connect to"
    Value:
      !Join [
        "",
        [
          "https://",
          !Ref RGempadHttpApi,
          ".execute-api.",
          !Ref "AWS::Region",
          ".amazonaws.com/",
          !Ref "RGempadHttpApiStage",
        ],
      ]

  AppBucketName:
    Description: "Name of the S3 bucket storing app assets."
    Value: !Ref AppBucket

  AppDomainName:
    Description: "Public URL for this environment's app SPA."
    Value: !Sub "https://app-${EnvName}.${DomainBase}" 

  AppDistributionId:
    Value: !Ref AppDistribution

  LandingBucketName:
    Condition: IsProd
    Description: "Name of the S3 bucket storing landing page assets."
    Value: !Ref LandingBucket

  LandingDistributionId:
    Condition: IsProd
    Value: !Ref LandingDistribution
